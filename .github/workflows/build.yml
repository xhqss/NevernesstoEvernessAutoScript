name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test imports
      run: |
        python -c "import module; print(f'Version: {module.__version__}')"
        python -c "from module.config import AlConfig; print('Config OK')"
        python -c "from module.task import ScriptTask; print('Task OK')"
        python -c "from module.ocr import OcrEngine; print('OCR engines:', OcrEngine.available_engines())"

  build:
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyappify
        pip install -r requirements.txt

    - name: Build installer
      run: |
        python -m pyappify build

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: al-script-installer
        path: dist/*.exe

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download installer
      uses: actions/download-artifact@v4
      with:
        name: al-script-installer
        path: dist/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*.exe
        generate_release_notes: true
